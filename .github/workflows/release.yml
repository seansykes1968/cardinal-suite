name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-05-09
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cardinal/package-lock.json

      - name: Install frontend dependencies
        working-directory: cardinal
        run: npm ci

      - name: Build frontend
        working-directory: cardinal
        run: npm run build

      - name: Build app with Tauri
        working-directory: cardinal/src-tauri
        run: cargo build --release

      - name: Upload app as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cardinal-Suite-macOS
          path: cardinal/src-tauri/target/release/cardinal*
          retention-days: 30
