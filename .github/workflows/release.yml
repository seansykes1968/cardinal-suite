name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.3). Leave blank to auto-increment.'
        required: false
        type: string

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version number
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "VERSION=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-05-09
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cardinal/package-lock.json

      - name: Install frontend dependencies
        working-directory: cardinal
        run: npm ci

      - name: Build frontend
        working-directory: cardinal
        run: npm run build

      - name: Build app bundle with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cardinal
          tagName: v${{ steps.version.outputs.VERSION }}
          releaseName: Cardinal Suite v${{ steps.version.outputs.VERSION }}
          releaseBody: |
            ## Cardinal Suite v${{ steps.version.outputs.VERSION }}

            Built from commit ${{ github.sha }}

            ### What's included in this build
            - Fix for Illustrator/Photoshop file locking during search
            - Faster initial indexing of network drives
            - Faster cache read/write
            - Improved handling of large sync bursts (Suite drive)

            ### Install instructions
            1. Download the `.app.tar.gz` file below
            2. Unzip it
            3. Drag **Cardinal.app** to your Applications folder
            4. Right-click → Open the first time (macOS security prompt)
          releaseDraft: false
          prerelease: false

      - name: Upload .app as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Cardinal-Suite-v${{ steps.version.outputs.VERSION }}
          path: cardinal/src-tauri/target/release/bundle/macos/*.app
          retention-days: 90
